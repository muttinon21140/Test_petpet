<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PetPet System (index)</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        /* -------------------- Global Reset & Setup -------------------- */
        html, body {
            height: 100%;
            height: 100dvh; /* ใช้ dvh เพื่อความพอดีกับมือถือเป๊ะๆ */
            overflow: hidden; /* ป้องกันการเลื่อนหน้าจอที่ระดับ body เพื่อไม่ให้ Navigation กระตุก */
        }

        body {
            font-family: "Prompt", sans-serif;
            background-color: #f0f4f9;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        .app-container-index {
            width: 100%;
            max-width: 410px;
            height: 100%; /* ให้เต็มจอ */
            overflow-y: auto; /* ให้มาเลื่อนเนื้อหาในกล่องนี้แทน */
            -webkit-overflow-scrolling: touch; /* เลื่อนลื่นไหลบน iOS */
            padding: 20px;
            box-sizing: border-box;
            padding-bottom: 120px;
        }

        /* -------------------- Footer Buttons -------------------- */
        .footer-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            margin: 0 auto; /* จัดกึ่งกลางโดยไม่ต้องใช้ transform เพื่อลดการกระตุก */
            width: 100%;
            max-width: 410px;
            display: none;
            z-index: 1000;
            -webkit-transform: translateZ(0); /* บังคับใช้ Hardware Acceleration บนมือถือ */
            transform: translateZ(0);
        }

        .navigation {
            position: relative;
            width: 100%;
            min-height: 70px; /* ใช้ min-height แทน height ตายตัว */
            background: #ffffff;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 -5px 25px rgba(0, 0, 0, 0.05);
            padding: 5px 0; /* เพิ่ม padding บนล่างนิดหน่อย */
            padding-bottom: calc(5px + env(safe-area-inset-bottom)); /* รองรับขอบล่างของ iPhone */
            box-sizing: border-box;
        }

        .navigation ul {
            display: flex;
            width: 100%;
            height: 100%;
            padding: 0;
            margin: 0;
            justify-content: space-between;
        }

        .navigation ul li {
            position: relative;
            list-style: none;
            flex: 1; /* ให้ทุกเมนูแบ่งความกว้างเท่าๆ กัน */
            height: 60px;
            z-index: 1;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .navigation ul li a {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            width: 100%;
            height: 100%;
            color: #94a3b8;
            transition: all 0.3s ease;
        }

        .navigation ul li a .icon {
            position: relative;
            display: block;
            font-size: 1.5em;
            margin-bottom: 2px;
            transition: 0.3s;
        }

        .navigation ul li a .title {
            position: relative;
            display: block;
            font-size: 0.65em; /* ลดขนาดฟอนต์ลงนิดนึงเพื่อไม่ให้เบียด */
            font-weight: 500;
            transition: 0.3s;
            white-space: nowrap; /* ห้ามให้ข้อความตกบรรทัด */
        }

        /* --- สถานะ Active (เมื่อถูกเลือก) --- */

        .navigation ul li.active a {
            color: #10b981; /* สีเขียว */
        }

        .navigation ul li.active a .icon {
            color: #10b981; /* สีเขียว */
            /* ลบ transform ออก เพื่อไม่ให้ไอคอนขยับ */
        }

    </style>
</head>

<body>
    <div class="app-container-index">
        <div id="app"></div>
        <footer class="footer-buttons">
            <div class="navigation">
                <ul>
                    <li class="list active" data-color="#1e232e">
                        <a href="#home">
                            <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
                            <span class="title">Home</span>
                        </a>
                    </li>
                    <li class="list" data-color="#1e232e">
                        <a href="#schedule">
                            <span class="icon"><ion-icon name="calendar-outline"></ion-icon></span>
                            <span class="title">Schedule</span>
                        </a>
                    </li>
                    <li class="list" data-color="#1e232e">
                        <a href="#notification">
                            <span class="icon"><ion-icon name="notifications-outline"></ion-icon></span>
                            <span class="title">Notification</span>
                        </a>
                    </li>
                    <li class="list" data-color="#1e232e">
                        <a href="#profile">
                            <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                            <span class="title">Profile</span>
                        </a>
                    </li>
                </ul>
            </div>
        </footer>
    </div>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/liff-require.js"></script>
    <script src="app.js"></script>
</body>

</html>
